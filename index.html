<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ReyLayouts - QuickShop</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; padding: 0; background-color: #f9fbfe; color: #333; }
        
        /* Navbar */
        nav { display: flex; justify-content: space-between; padding: 20px 50px; align-items: center; background: white; }
        .logo { font-weight: bold; font-size: 24px; color: #00C3FF; }
        .menu a { margin-right: 20px; text-decoration: none; color: #333; }
        .btn-primary { background-color: #00C3FF; color: white; border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; font-weight: bold; }

        /* Hero */
        .hero { display: flex; align-items: center; padding: 80px 50px; gap: 40px; }
        .hero-text { flex: 1; }
        .hero-text h1 { font-size: 48px; margin-bottom: 20px; }
        .btn-demo { background-color: #00C3FF; color: white; border: none; padding: 15px 30px; border-radius: 8px; font-size: 16px; cursor: pointer; margin-top: 20px; }

        /* Ilustrasi Placeholder */
        .hero-image { flex: 1; display: flex; justify-content: center; }
        .placeholder-img { width: 300px; height: 200px; background-color: #ddd; border-radius: 10px; }

        /* Responsif */
        @media (max-width: 768px) {
            .hero { flex-direction: column; text-align: center; padding: 40px 20px; }
            .hero-text h1 { font-size: 32px; }
            nav { padding: 20px; }
        }
    </style>
</head>
<body>

    <nav>
        <div class="logo">ReyLayouts</div>
        <div class="menu">
            <a href="#">Features</a>
            <a href="#">Pricing</a>
            <a href="#">Demo</a>
            <button class="btn-primary">Get QuickShop</button>
        </div>
    </nav>

    <header class="hero">
        <div class="hero-text">
            <h1>Build Your Dream Online Store in Minutes</h1>
            <p>The ultra-fast, user-friendly micro-store template by ReyLayouts. Focus on selling, not coding.</p>
            <button class="btn-demo">Try Live Demo</button>
        </div>
        <div class="hero-image">
            <div class="placeholder-img"></div>
        </div>
    </header>

</body>
</html>
